<!DOCTYPE html>
<!-- Declara el tipo de documento. Indica al navegador que usara HTML5 -->
<html lang="es">
<!-- Elemento principal del documento HTML. lang="es" indica que el contenido esta en "español"-->

<head> <!--Seccion de configuracion del documento-->
    <meta charset="UTF-8">
    <!-- Define la codificacion de caracteres. UTF-8 permite usar correctamente tildes, ñ, simbolos,etc -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que el sitio sea responsive. Permite que el diseño se adapte correctamente a celulares y tablets-->
    <title>Practicando HTML - img y video</title>
    <!-- Titulo que aparece en el navegador -->
    <meta name="author" content="Catalina Mena">
    <!-- Indicaquien creo el sitio web -->

    <link rel="stylesheet" href="static/css/style.css">
    <!-- Conexion con hoja CSS de estilos -->
</head>

<body>
    <header> <!-- Encabezado del documento-->
        <h1>Sitio multimedia personal</h1>
    </header>
    <hr> <!-- Crea una linea de division -->
    <main> <!-- Seccion principal deldocumento -->
        <h2>Mis datos:</h2>
        <p>Nombre: Catalina Mena<br> <!-- br es un salto de linea-->
            Curso: 3°C
        </p>
        <hr>
        <h2>Galeria multimedia</h2>
        <p>Imagen de ejemplo</p>
        <img src="static/images/imagen1.png" alt="primera imagen" width="300">
        <img src="static/images/imagen2.png" alt="primera imagen" width="300">
        <img src="static/images/imagen3.png" alt="primera imagen" width="300">
        <hr>
        <h2>Videos</h2>
        <video width="600" controls>
            <source src="static/videos/video1.mp4" type="video/mp4">
        </video>
        <video width="600" controls>
            <source src="static/videos/video2.mp4" type="video/mp4">
        </video>
    </main>
    <footer>
        <p style="text-align:center">Todos los derechos reservados
            -<a href="https://pusheen.com/">Mas informacion</a> <!-- etiqueta <a> para vinculos -->
        </p>
    </footer>
</body>

</html>
